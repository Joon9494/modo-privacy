<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="Of70QRDsZ9vJ6VzkjWwu6vR5HpgyE1Z2km7QuCwpwNQ" />
  <title>키보(Kibo)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f8f9fa;
      color: #212529;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      text-align: center;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #1a73e8;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #666;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a.btn {
      display: block;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity .15s;
    }
    a.btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-secondary {
      background: #e8f0fe;
      color: #1a73e8;
    }
    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📚</div>
    <h1>Kibo</h1>
    <p class="subtitle">교사를 위한 AI 일상 관리 앱<br>시간표, 일정, 학생 관리를 한 곳에서</p>
    <div class="links">
      <a class="btn btn-primary" href="https://play.google.com/store/apps/details?id=com.lazzywhale.kibo" target="_blank">
        Google Play에서 다운로드
      </a>
      <a class="btn btn-secondary" href="./privacy/">
        개인정보처리방침
      </a>
    </div>
  </div>
  <footer>© 2026 Kibo · hopejs94@gmail.com</footer>
</body>
</html>
